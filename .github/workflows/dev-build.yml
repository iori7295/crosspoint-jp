name: Dev Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/**'
      - 'lib/EpdFont/scripts/**'
      - 'flasher/**'

concurrency:
  group: dev-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  dev-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Build
        run: |
          set -euo pipefail
          pio run -e gh_release
          firmware="$(find .pio/build -maxdepth 3 -type f -path "*/firmware.bin" | grep "/gh_release/" | head -n1)"
          bootloader="$(find .pio/build -maxdepth 3 -type f -path "*/bootloader.bin" | grep "/gh_release/" | head -n1)"
          partitions="$(find .pio/build -maxdepth 3 -type f -path "*/partitions.bin" | grep "/gh_release/" | head -n1)"
          if [ -z "${firmware}" ] || [ -z "${bootloader}" ] || [ -z "${partitions}" ]; then exit 1; fi
          cp "${firmware}" firmware.bin
          cp "${bootloader}" bootloader.bin
          cp "${partitions}" partitions.bin

      - name: Generate release metadata
        id: meta
        run: |
          TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
          echo "tag_name=dev-${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: Dev Build ${{ steps.meta.outputs.tag_name }}
          prerelease: true
          make_latest: false
          files: |
            firmware.bin
            bootloader.bin
            partitions.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
