name: Dev Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/**'
      - 'lib/EpdFont/scripts/**'
      - 'flasher/**'

concurrency:
  group: dev-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  dev-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Generate i18n
        run: python3 scripts/gen_i18n.py lib/I18n/translations lib/I18n/

      - name: Build
        run: |
          set -euo pipefail
          pio run -e gh_release
          firmware="$(find .pio/build -maxdepth 3 -type f -path '*/firmware.bin' | grep '/gh_release/' | head -n1)"
          bootloader="$(find .pio/build -maxdepth 3 -type f -path '*/bootloader.bin' | grep '/gh_release/' | head -n1)"
          partitions="$(find .pio/build -maxdepth 3 -type f -path '*/partitions.bin' | grep '/gh_release/' | head -n1)"
          if [ -z "${firmware}" ] || [ -z "${bootloader}" ] || [ -z "${partitions}" ]; then exit 1; fi
          cp "${firmware}" firmware.bin
          cp "${bootloader}" bootloader.bin
          cp "${partitions}" partitions.bin
          python3 -c "open('firmware_ota1_empty.bin','wb').write(b'\\x00'*4096)"

      - name: Generate release metadata
        id: meta
        run: |
          TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
          echo "tag_name=dev-${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Generate otadata (force boot from ota_0)
        run: python3 scripts/generate_otadata.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: Dev Build ${{ steps.meta.outputs.tag_name }}
          prerelease: true
          make_latest: false
          files: |
            firmware.bin
            bootloader.bin
            partitions.bin
            firmware_ota1_empty.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
